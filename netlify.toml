# Netlify config for bashunit.com (docs site + installer)
#
# Hosting lives under the bashunit-owned Netlify account, with DNS managed at
# IONOS pointing bashunit.com -> Netlify. This keeps the site self-contained:
# the installer is served from the repo's canonical install.sh (no drift), and
# no external dashboard rules are required.
#
# Manual one-time setup (Netlify UI):
#   1. Connect this GitHub repo to a new Netlify site (your account).
#   2. Set the production branch to `latest` (matches the docs release flow).
#   3. Add `bashunit.com` as a custom domain.
#   4. At IONOS, point bashunit.com at Netlify (CNAME to the *.netlify.app
#      target, or the apex via Netlify DNS / ALIAS as IONOS allows).

[build]
  base = "docs"
  command = "npm ci && npm run build && cp ../install.sh .vitepress/dist/install.sh"
  publish = ".vitepress/dist"

[build.environment]
  NODE_VERSION = "20"

# Serve install.sh as plain text so `curl -s https://bashunit.com/install.sh | bash` works.
[[headers]]
  for = "/install.sh"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
